name: macOS

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build macOS app
        run: bun run build:desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Archive app bundle
        run: ditto -c -k --keepParent release/mac-arm64/Dither.app release/Dither-mac-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dither-mac-arm64
          path: release/Dither-mac-arm64.zip
          if-no-files-found: error
